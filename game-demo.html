<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة تجريبية - GOMAK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Cairo', sans-serif;
    }
    .game-container {
      text-align: center;
      padding: 20px;
    }
    canvas {
      border: 3px solid #a855f7;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(168,85,247,0.3);
    }
    .score {
      color: white;
      font-size: 24px;
      margin-bottom: 15px;
    }
    .controls {
      margin-top: 20px;
      color: #888;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="score">⭐ النقاط: <span id="score">0</span></div>
  <canvas id="gameCanvas" width="600" height="400"></canvas>
  <div class="controls">🎮 استخدم الماوس لجمع النقاط الذهبية</div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let score = 0;
  let player = { x: 300, y: 200, size: 20 };
  let coins = [];
  
  // عمل عملات عشوائية
  for(let i = 0; i < 10; i++) {
    coins.push({
      x: Math.random() * (canvas.width - 20) + 10,
      y: Math.random() * (canvas.height - 20) + 10,
      size: 10
    });
  }
  
  // رسم اللاعب
  function drawPlayer() {
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(player.x - 7, player.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(player.x + 7, player.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(player.x - 7, player.y - 5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(player.x + 7, player.y - 5, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // رسم العملات
  function drawCoins() {
    for(let coin of coins) {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, coin.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, coin.size - 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // تحريك اللاعب مع الماوس
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let mouseX = (e.clientX - rect.left) * scaleX;
    let mouseY = (e.clientY - rect.top) * scaleY;
    player.x = Math.min(Math.max(mouseX, player.size), canvas.width - player.size);
    player.y = Math.min(Math.max(mouseY, player.size), canvas.height - player.size);
  });
  
  // التحقق من التصادم مع العملات
  function checkCollision() {
    for(let i = 0; i < coins.length; i++) {
      const dx = player.x - coins[i].x;
      const dy = player.y - coins[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if(dist < player.size + coins[i].size) {
        coins.splice(i, 1);
        score += 10;
        document.getElementById('score').innerText = score;
        // إضافة عملة جديدة
        coins.push({
          x: Math.random() * (canvas.width - 20) + 10,
          y: Math.random() * (canvas.height - 20) + 10,
          size: 10
        });
        break;
      }
    }
  }
  
  // رسم اللعبة
  function draw() {
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // رسم شبكة
    ctx.strokeStyle = 'rgba(168,85,247,0.1)';
    for(let i = 0; i < canvas.width; i += 50) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i);
      ctx.lineTo(canvas.width, i);
      ctx.stroke();
    }
    
    drawCoins();
    drawPlayer();
    checkCollision();
    
    requestAnimationFrame(draw);
  }
  
  draw();
</script>
</body>
</html>
