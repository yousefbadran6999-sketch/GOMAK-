<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>جوماك — العالم الافتراضي</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- رصيد العملات -->
  <div class="wallet">
    <div class="wallet-icon">🪙</div>
    <span id="coinBalance">500</span>
    <span>GOMAK</span>
    <button class="charge-btn" onclick="chargeDollars()">💵 شحن</button>
  </div>

  <!-- زر VPN -->
  <button class="vpn-btn" onclick="toggleVPN()">🔒 VPN مجاني</button>

  <!-- نافبار -->
  <nav>
    <div class="logo">GO<span>MAK</span></div>
    <ul class="nav-links">
      <li><a href="#games">الألعاب</a></li>
      <li><a href="#skins">المظاهر</a></li>
      <li><a href="#friends">الأصدقاء</a></li>
      <li><a href="#maps">المابات</a></li>
    </ul>
    <button class="login-btn" onclick="openModal()">دخول</button>
  </nav>

  <!-- الهيرو -->
  <div class="hero">
    <h1>عالمك الافتراضي <span>GOMAK</span></h1>
    <p>العب، ابني، وشارك ألعابك مع العالم</p>
    <div class="hero-btns">
      <button class="btn-primary" onclick="openModal()">🎮 ابدأ مجاناً</button>
      <button class="btn-secondary" onclick="createMap()">🗺️ أنشئ خريطة</button>
    </div>
  </div>

  <!-- الألعاب -->
  <section id="games">
    <h2>أشهر الألعاب</h2>
    <div class="games-grid" id="gamesGrid"></div>
  </section>

  <!-- المظاهر (Skins) -->
  <section id="skins">
    <h2>مظاهر أنمي</h2>
    <div class="skins-grid" id="skinsGrid"></div>
  </section>

  <!-- الأصدقاء -->
  <section id="friends">
    <h2>أصدقائك</h2>
    <div class="friend-input">
      <input type="text" id="friendName" placeholder="اسم الصديق">
      <button onclick="addFriend()">➕ إضافة</button>
    </div>
    <ul id="friendsList"></ul>
  </section>

  <!-- المابات -->
  <section id="maps">
    <h2>المابات التي أنشأتها</h2>
    <div id="mapsList"></div>
  </section>

  <!-- مودال تسجيل الدخول -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">دخول</button>
        <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
      </div>
      <div id="loginTab">
        <input type="text" placeholder="اسم اللاعب" id="loginUsername">
        <input type="password" placeholder="كلمة المرور" id="loginPassword">
        <button onclick="login()">دخول</button>
      </div>
      <div id="registerTab" style="display:none">
        <input type="text" placeholder="اسم اللاعب" id="regUsername">
        <input type="password" placeholder="كلمة المرور (8+ أحرف وأرقام)" id="regPassword">
        <button onclick="register()">إنشاء حساب</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
